{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Best Cars Dealership</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
<nav class="navbar">
    <div class="brand">
        <a href="/">Best Cars</a>
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/static/About.html">About Us</a>
        <a href="/static/Contact.html">Contact Us</a>

        {% if user.is_authenticated %}
            <span class="username">Logged in as {{ user.username }}</span>
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/login/">Login</a>
            <a href="/register/">Register</a>
        {% endif %}
    </div>
</nav>

<main class="container">
    {% block content %}
    {% endblock %}
</main>
</body>
</html>
